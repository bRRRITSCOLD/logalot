# AWS deployment stack (ADR-0009, ADR-0010, ADR-0011).
#
# Key differences from docker-compose.yml (local dev):
#   - NO mongodb  (reserved/unused — ADR-0003 alternatives, per ADR-0009)
#   - NO floci    (replaced by real AWS S3/Athena — ADR-0005/ADR-0009)
#   - Adds all application services (5 Go + control-plane + web)
#   - Adds Caddy (TLS termination + HSTS reverse-proxy — ADR-0010, R16)
#   - Per-container mem_limit + memswap_limit (ADR-0011: t4g.small 2 GiB RAM
#     + ~2 GiB gp3 swap file; limits prevent one container from OOM-killing
#     neighbours; memswap_limit enables swap as a burst safety net)
#   - Real AWS credentials; NO AWS_ENDPOINT_URL override (points to S3/Athena)
#
# Usage:
#   docker compose -f docker-compose.aws.yml up -d
#
# Config/secrets come from .env (populated from SSM at boot by cloud-init,
# ADR-0010). Copy .env.example -> .env and fill in the AWS section.
#
# Image tags: IMAGE_TAG defaults to `latest`; pin to a specific SHA or semver
# in production (e.g. IMAGE_TAG=sha-abc1234).

name: logalot

services:
  # ---------------------------------------------------------------------------
  # Infrastructure backing stores
  # Postgres tuned for a small box: modest shared_buffers so the process RSS
  # stays well inside mem_limit (ADR-0011 §Instance sizing).
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: logalot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: >-
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=50
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - logalot
    # ADR-0011: estimated RSS ~350 MB; 400 m cap + 768 m swap ceiling.
    mem_limit: 400m
    memswap_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: logalot-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
      # Hard cap inside the process to stay within mem_limit (ADR-0011).
      - --maxmemory
      - 80mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - logalot
    # ADR-0011: estimated RSS ~90 MB; 128 m cap + 256 m swap ceiling.
    mem_limit: 128m
    memswap_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: logalot-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - logalot
    # ADR-0011: estimated RSS ~350 MB; 400 m cap + 768 m swap ceiling.
    mem_limit: 400m
    memswap_limit: 768m
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 25s

  # ---------------------------------------------------------------------------
  # Go services (5 units built from the single multi-stage Dockerfile, ADR-0001)
  # All reach infra via service hostnames on the logalot network; host-published
  # ports are NOT exposed — Caddy is the only public entry point.
  # ---------------------------------------------------------------------------
  ingest-service:
    image: logalot/ingest-service:${IMAGE_TAG:-latest}
    container_name: logalot-ingest-service
    restart: unless-stopped
    environment:
      # NOSUPERUSER logalot_app role — FORCE ROW LEVEL SECURITY governs it.
      LOGALOT_APP_DATABASE_URL: >-
        postgres://logalot_app:${LOGALOT_APP_PASSWORD:-logalot_app}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      INGEST_HTTP_ADDR: ":8080"
    networks:
      - logalot
    # ADR-0011: 5 Go units share ~250 MB; ~50 MB each → 96 m cap + 192 m swap.
    mem_limit: 96m
    memswap_limit: 192m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  processor:
    image: logalot/processor:${IMAGE_TAG:-latest}
    container_name: logalot-processor
    restart: unless-stopped
    environment:
      LOGALOT_APP_DATABASE_URL: >-
        postgres://logalot_app:${LOGALOT_APP_PASSWORD:-logalot_app}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Cold-tier: feature-flagged OFF; flip COLD_ENABLED=true once the
      # cold_smoke_aws smoke test passes (ADR-0005, decision 016 §6).
      COLD_ENABLED: ${COLD_ENABLED:-false}
      COLD_BUCKET: ${COLD_S3_BUCKET}
      COLD_GLUE_DB: ${COLD_GLUE_DB:-logalot_cold}
      COLD_ATHENA_RESULT_BUCKET: ${COLD_ATHENA_RESULT_BUCKET}
      COLD_ATHENA_WORKGROUP: ${COLD_ATHENA_WORKGROUP:-primary}
      AWS_REGION: ${AWS_REGION}
      AWS_DEFAULT_REGION: ${AWS_REGION}
      # No AWS_ENDPOINT_URL — real S3/Athena (not floci) in the AWS env.
    networks:
      - logalot
    mem_limit: 96m
    memswap_limit: 192m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  query-service:
    image: logalot/query-service:${IMAGE_TAG:-latest}
    container_name: logalot-query-service
    restart: unless-stopped
    environment:
      LOGALOT_APP_DATABASE_URL: >-
        postgres://logalot_app:${LOGALOT_APP_PASSWORD:-logalot_app}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Shared with control-plane: query-service VERIFIES UI session JWTs (#74).
      JWT_SECRET: ${JWT_SECRET}
      QUERY_HTTP_ADDR: ":8081"
      COLD_S3_BUCKET: ${COLD_S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
      AWS_DEFAULT_REGION: ${AWS_REGION}
    networks:
      - logalot
    mem_limit: 96m
    memswap_limit: 192m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  alert-evaluator:
    image: logalot/alert-evaluator:${IMAGE_TAG:-latest}
    container_name: logalot-alert-evaluator
    restart: unless-stopped
    environment:
      # Two-role pattern (model.md §4.5): logalot_app (RLS) + logalot_evaluator (BYPASSRLS).
      LOGALOT_APP_DATABASE_URL: >-
        postgres://logalot_app:${LOGALOT_APP_PASSWORD:-logalot_app}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      LOGALOT_EVALUATOR_DATABASE_URL: >-
        postgres://logalot_evaluator:${LOGALOT_EVALUATOR_PASSWORD:-logalot_evaluator}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      ALERT_NOTIFIER: ${ALERT_NOTIFIER:-logsink}
      ALERT_EVAL_INTERVAL: ${ALERT_EVAL_INTERVAL:-10s}
    networks:
      - logalot
    mem_limit: 96m
    memswap_limit: 192m
    depends_on:
      postgres:
        condition: service_healthy

  retention-worker:
    image: logalot/retention-worker:${IMAGE_TAG:-latest}
    container_name: logalot-retention-worker
    restart: unless-stopped
    environment:
      # BYPASSRLS logalot_retention role — reads scheduling metadata across all
      # tenants; has no access to log_events content (model.md §4.5).
      LOGALOT_RETENTION_DATABASE_URL: >-
        postgres://logalot_retention:${LOGALOT_RETENTION_PASSWORD:-logalot_retention}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      COLD_S3_BUCKET: ${COLD_S3_BUCKET}
      # Kill-switch defaults OFF: an accidental deploy deletes nothing (ADR-0005).
      RETENTION_ENABLED: ${RETENTION_ENABLED:-false}
      RETENTION_DRY_RUN: ${RETENTION_DRY_RUN:-false}
      HOT_RETENTION_DAYS: ${HOT_RETENTION_DAYS:-30}
      RETENTION_INTERVAL: ${RETENTION_INTERVAL:-24h}
      AWS_REGION: ${AWS_REGION}
      AWS_DEFAULT_REGION: ${AWS_REGION}
    networks:
      - logalot
    mem_limit: 96m
    memswap_limit: 192m
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Application services (Node)
  # ---------------------------------------------------------------------------
  control-plane:
    image: logalot/control-plane:${IMAGE_TAG:-latest}
    container_name: logalot-control-plane
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOGALOT_APP_DATABASE_URL: >-
        postgres://logalot_app:${LOGALOT_APP_PASSWORD:-logalot_app}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      # Redis for the OAuth in-flight state store (issue #89); required in
      # production/multi-replica; in-memory fallback is single-process dev only.
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CONTROL_PLANE_PORT: "8082"
    networks:
      - logalot
    # ADR-0011: estimated RSS ~180 MB; 256 m cap + 512 m swap ceiling.
    mem_limit: 256m
    memswap_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    image: logalot/web:${IMAGE_TAG:-latest}
    container_name: logalot-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      # BFF -> control-plane over the compose network (never exposed publicly).
      CONTROL_PLANE_URL: http://control-plane:8082
      # BFF -> query-service SSE proxy (live tail, ADR-0006).
      QUERY_SERVICE_URL: http://query-service:8081
      # JWT_SECRET: query-service verifies JWTs the web BFF forwards (#74).
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - logalot
    # ADR-0011: estimated RSS ~180 MB; 256 m cap + 512 m swap ceiling.
    mem_limit: 256m
    memswap_limit: 512m
    depends_on:
      control-plane:
        condition: service_healthy
      query-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Caddy — TLS termination, HSTS, and reverse proxy (ADR-0009/0010, R16)
  #
  # Obtains and auto-renews a Let's Encrypt certificate via ACME HTTP-01.
  # LOGALOT_DOMAIN + LOGALOT_TLS_EMAIL are read by the Caddyfile at runtime via
  # Caddy's {env.*} interpolation. Data volume persists certs across restarts.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: logalot-caddy
    restart: unless-stopped
    environment:
      LOGALOT_DOMAIN: ${LOGALOT_DOMAIN}
      LOGALOT_TLS_EMAIL: ${LOGALOT_TLS_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/aws/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - logalot
    # ADR-0011: estimated RSS ~40 MB; 64 m cap + 128 m swap ceiling.
    mem_limit: 64m
    memswap_limit: 128m
    depends_on:
      web:
        condition: service_healthy
      ingest-service:
        condition: service_healthy
      query-service:
        condition: service_healthy
      control-plane:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  caddy-data:
  caddy-config:

networks:
  logalot:
    name: logalot
    driver: bridge
