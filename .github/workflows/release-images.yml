name: release-images

# Publish multi-arch (linux/amd64 + linux/arm64) OCI images for all 7 app
# images to GitHub Container Registry on every push to main and every semver
# tag.  The workflow uses a single parameterised matrix for the 5 Go services
# (sharing one Dockerfile via SERVICE=) plus dedicated jobs for control-plane
# and web.

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

env:
  REGISTRY: ghcr.io
  GO_VERSION: "1.26"
  NODE_VERSION: "22"

# ---------------------------------------------------------------------------
# Reusable Docker meta + QEMU + Buildx setup is defined once in each job
# because GitHub Actions does not yet support true job-level "setup" steps
# shared across matrix rows without a separate setup job.  The three login +
# QEMU + buildx steps are light-weight (cached by the runner) and keep each
# job independently re-runnable.
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # 5 Go services — one Dockerfile, SERVICE build-arg selects the binary.
  # -------------------------------------------------------------------------
  go-services:
    name: "go/${{ matrix.service }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        service:
          - ingest-service
          - processor
          - query-service
          - alert-evaluator
          - retention-worker

    steps:
      - uses: actions/checkout@v4

      # Multi-arch cross-compilation requires QEMU for the arm64 emulation
      # layer on the amd64 GitHub runner.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Canonical image tag strategy:
      #   branch main  → ghcr.io/<owner>/logalot-<service>:main + :sha-<short>
      #   semver tag   → ghcr.io/<owner>/logalot-<service>:<tag> + :latest
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/logalot-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # control-plane — Node/Fastify service (Dockerfile.control-plane)
  # -------------------------------------------------------------------------
  control-plane:
    name: control-plane
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/logalot-control-plane
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.control-plane
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # web — TanStack Start BFF + React app (Dockerfile.web)
  # -------------------------------------------------------------------------
  web:
    name: web
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/logalot-web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
