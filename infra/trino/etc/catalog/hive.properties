connector.name=hive
hive.metastore.uri=thrift://hms:9083

# S3 (MinIO) access via Trino's native S3 filesystem (replaces the legacy
# hive.s3.* properties removed in recent Trino).
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
s3.path-style-access=true

# External-table writes + name-based Parquet column mapping (matches the
# self-describing Parquet files written by coldstore).
hive.non-managed-table-writes-enabled=true
hive.parquet.use-column-names=true

# Engine-enforced partition predicate (the faithful local analog of Athena's
# `projection.tenant_id.type=injected`, decision 016 §3): a query that does not
# filter on a partition column is REJECTED by the engine. This is what lets the
# cold_query test prove a no-tenant query fails at the engine, not just at the
# app-side fitness gate.
hive.query-partition-filter-required=true
