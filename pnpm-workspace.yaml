# Logalot pnpm workspace.
#
# Node services live under services/* (e.g. control-plane, issue #11) and the
# frontend app(s) under apps/* (e.g. web TanStack Start, issue #20). Shared,
# framework-agnostic packages (e.g. design-tokens, issue #19) live under
# packages/*. Shared repo tooling/placeholder packages live under tools/*.
#
# A directory only joins the workspace once it has a package.json; reserved
# service/app dirs that hold just a README are ignored until they are built.
packages:
  - "services/*"
  - "apps/*"
  - "packages/*"
  - "tools/*"
