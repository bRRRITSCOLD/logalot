# Logalot local stack (docs/architecture/overview.md §7).
# One command brings up the full data plane: postgres, mongodb (reserved),
# redis, rabbitmq, floci (AWS-local), mailhog (local SMTP catcher, ADR-0013).
# Every service has a healthcheck and lives on the user-defined `logalot`
# network. All config comes from a single `.env` (copy `.env.example` -> `.env`).

name: logalot

services:
  postgres:
    image: postgres:16-alpine
    container_name: logalot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - logalot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:7
    container_name: logalot-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - logalot
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mongosh -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --quiet --eval \"db.adminCommand('ping').ok\" | grep -q 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: logalot-redis
    restart: unless-stopped
    # Password is exposed to the container so the healthcheck can AUTH; the
    # server itself is configured via --requirepass below.
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - logalot
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: logalot-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - logalot
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  floci:
    # Pinned for reproducibility (verified running 1.5.28). Override via .env FLOCI_VERSION.
    image: floci/floci:${FLOCI_VERSION:-1.5.28}
    container_name: logalot-floci
    restart: unless-stopped
    environment:
      # Containers resolve floci-issued AWS URLs to this hostname on the network.
      FLOCI_HOSTNAME: ${FLOCI_HOSTNAME:-floci}
      # hybrid persists emulator state to the mounted volume (/app/data).
      FLOCI_STORAGE_MODE: ${FLOCI_STORAGE_MODE:-hybrid}
      AWS_REGION: ${AWS_REGION}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "${FLOCI_PORT:-4566}:4566"
    volumes:
      - floci-data:/app/data
      # Container-backed services (e.g. Athena/Glue) need the host docker socket.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - logalot
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_floci/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  mailhog:
    # Local mail catcher for the dev loop (ADR-0013 local-parity). Accepts SMTP
    # on :1025 (no auth — matches EMAIL_PROVIDER=smtp dev config) and serves a
    # web UI on :8025 to inspect rendered invite emails without a real send.
    image: mailhog/mailhog:v1.0.1
    container_name: logalot-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - logalot
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8025/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  rabbitmq-data:
  floci-data:

networks:
  logalot:
    name: logalot
    driver: bridge
